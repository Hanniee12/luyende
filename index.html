<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>📂 File Manager</title>

<style>
body {
  background:#0d1117;
  color:#fff;
  font-family: Arial;
  padding:20px;
}

h2 { color:#00ffcc }

.item {
  border:1px solid #00ffcc33;
  padding:12px;
  margin:8px 0;
  border-radius:10px;
  cursor:pointer;
  transition:0.2s;
}

.item:hover {
  background:#00ffcc22;
  color:#00ffcc;
}

#preview {
  margin-top:20px;
}

img, video {
  max-width:100%;
  border-radius:10px;
  margin-top:10px;
}
</style>
</head>

<body>

<h2>📂 File Manager GitHub</h2>

<div id="path"></div>
<div id="list"></div>

<hr>
<div id="preview"></div>

<script>
const user = "Hanniee12";
const repo = "luyende";
const basePath = "data";

async function loadFiles(folder="") {
  const api = `https://api.github.com/repos/${user}/${repo}/contents/${basePath}${folder ? "/" + folder : ""}?ref=main`;

  const res = await fetch(api);
  const data = await res.json();

  const list = document.getElementById("list");
  list.innerHTML = "";

  document.getElementById("path").innerHTML = "📁 /" + (folder || "data");

  // ⬅ quay lại
  if (folder !== "") {
    const back = document.createElement("div");
    back.className = "item";
    back.innerHTML = "⬅ Quay lại";
    back.onclick = () => loadFiles(folder.split("/").slice(0,-1).join("/"));
    list.appendChild(back);
  }

  data.forEach(item => {
    const div = document.createElement("div");
    div.className = "item";

    let icon = "📄";
    if (item.type === "dir") icon = "📁";
    if (item.name.match(/\.(jpg|png|jpeg|webp|gif)$/i)) icon = "🖼️";
    if (item.name.match(/\.(mp4|webm)$/i)) icon = "🎬";
    if (item.name.match(/\.pdf$/i)) icon = "📕";

    if (item.type === "dir") {
      div.innerHTML = `${icon} ${item.name}`;
      div.onclick = () => loadFiles((folder ? folder + "/" : "") + item.name);
    } else {
      div.innerHTML = `${icon} ${item.name}`;
      div.onclick = () => previewFile(item);
    }

    list.appendChild(div);
  });
}

// 🔥 PREVIEW FILE (FIX FULL)
function previewFile(file) {
  const url = file.download_url; // QUAN TRỌNG
  const name = file.name.toLowerCase();
  const preview = document.getElementById("preview");

  preview.innerHTML = `<h3>📄 ${file.name}</h3>`;

  // 🖼️ ẢNH → HIỂN THỊ (KHÔNG DOWNLOAD)
  if (name.match(/\.(jpg|jpeg|png|gif|webp)$/)) {
    preview.innerHTML += `
      <img src="${url}" style="max-width:100%;cursor:pointer"
           onclick="window.open('${url}')">
    `;
  }

  // 🎬 VIDEO
  else if (name.match(/\.(mp4|webm|ogg)$/)) {
    preview.innerHTML += `
      <video controls src="${url}" style="max-width:100%"></video>
    `;
  }

  // 📕 PDF
  else if (name.endsWith(".pdf")) {
    preview.innerHTML += `
      <iframe src="${url}" width="100%" height="600px"></iframe>
      <br><br>
      <a href="${url}" target="_blank">👉 Mở nếu không xem được</a>
    `;
  }

  // 📦 FILE KHÁC
  else {
    preview.innerHTML += `
      <a href="${url}" target="_blank">👉 Tải file</a>
    `;
  }
}

loadFiles();
</script>

</body>
</html>
