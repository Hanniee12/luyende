<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>📂 File Manager</title>

<style>
body {
  background:#0d1117;
  color:#00ffcc;
  font-family: Arial;
  padding:20px;
}
h2 { color:#00ffaa }

.item {
  border:1px solid #00ffcc33;
  padding:10px;
  margin:6px 0;
  border-radius:8px;
  cursor:pointer;
  transition:0.2s;
}
.item:hover {
  background:#00ffcc22;
}

a {
  color:#00ffcc;
  text-decoration:none;
}

#preview {
  margin-top:20px;
}
img, video {
  max-width:100%;
  border-radius:10px;
  margin-top:10px;
}
</style>
</head>

<body>

<h2>📂 File Manager GitHub</h2>
<div id="path"></div>
<div id="list"></div>

<div id="preview"></div>

<script>
const user = "USERNAME"; // sửa
const repo = "REPO";     // sửa
const basePath = "data"; // thư mục chứa file

async function loadFiles(folder="") {
  const api = `https://api.github.com/repos/${user}/${repo}/contents/${basePath}${folder ? "/" + folder : ""}`;
  const res = await fetch(api);
  const data = await res.json();

  document.getElementById("path").innerHTML = "📁 /" + folder;

  const list = document.getElementById("list");
  list.innerHTML = "";

  // nút quay lại
  if (folder !== "") {
    const back = document.createElement("div");
    back.className = "item";
    back.innerHTML = "⬅ Quay lại";
    back.onclick = () => loadFiles(folder.split("/").slice(0,-1).join("/"));
    list.appendChild(back);
  }

  data.forEach(item => {
    const div = document.createElement("div");
    div.className = "item";

    if (item.type === "dir") {
      div.innerHTML = "📁 " + item.name;
      div.onclick = () => loadFiles((folder ? folder + "/" : "") + item.name);
    } else {
      div.innerHTML = "📄 " + item.name;
      div.onclick = () => previewFile(item);
    }

    list.appendChild(div);
  });
}

// preview file
function previewFile(file) {
  const url = file.download_url;
  const name = file.name.toLowerCase();
  const preview = document.getElementById("preview");

  preview.innerHTML = `<h3>📄 ${file.name}</h3>`;

  if (name.match(/\.(jpg|jpeg|png|gif|webp)$/)) {
    preview.innerHTML += `<img src="${url}">`;
  }
  else if (name.match(/\.(mp4|webm|ogg)$/)) {
    preview.innerHTML += `<video controls src="${url}"></video>`;
  }
  else if (name.match(/\.(pdf)$/)) {
    preview.innerHTML += `<iframe src="${url}" width="100%" height="500px"></iframe>`;
  }
  else {
    preview.innerHTML += `<a href="${url}" target="_blank">👉 Tải / mở file</a>`;
  }
}

loadFiles();
</script>

</body>
</html>
