<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FileThi</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --c1:#7c3aed;--c2:#06b6d4;--c3:#f472b6;
  --glass:rgba(255,255,255,0.04);
  --gb:rgba(255,255,255,0.08);
  --text:#f1f5f9;--muted:#94a3b8;--dim:#475569;
}
body{background:#080b14;color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;overflow-x:hidden}
#aurora{position:fixed;inset:0;z-index:0;pointer-events:none}
.wrap{position:relative;z-index:2;max-width:820px;margin:0 auto;padding:52px 24px 100px}
.glass{background:var(--glass);border:1px solid var(--gb);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}

/* HEADER */
.hdr{margin-bottom:52px;animation:fadeUp .7s cubic-bezier(.22,1,.36,1) both}
.hdr-inner{display:flex;align-items:center;gap:20px}
.logo{
  width:56px;height:56px;border-radius:18px;flex-shrink:0;
  background:linear-gradient(135deg,var(--c1),var(--c2));
  display:flex;align-items:center;justify-content:center;font-size:26px;
  box-shadow:0 0 0 1px rgba(255,255,255,.1),0 20px 60px rgba(124,58,237,.4);
  animation:logoPop .9s cubic-bezier(.34,1.56,.64,1) .1s both;
}
@keyframes logoPop{from{opacity:0;transform:scale(.4) rotate(-15deg)}to{opacity:1;transform:scale(1) rotate(0)}}
h1{
  font-size:32px;font-weight:700;letter-spacing:-1.5px;
  background:linear-gradient(100deg,#c4b5fd,#67e8f9,#f9a8d4,#c4b5fd);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-size:300%;animation:gs 5s ease infinite;
}
@keyframes gs{0%,100%{background-position:0%}50%{background-position:100%}}
.sub{font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--dim);letter-spacing:1.5px;margin-top:5px;text-transform:uppercase}

/* BREADCRUMB */
.bc{
  display:flex;align-items:center;gap:8px;padding:10px 18px;
  border-radius:14px;margin-bottom:16px;
  font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--c2);
  animation:fadeUp .4s ease both;position:relative;overflow:hidden;
}
.bc::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:linear-gradient(180deg,var(--c1),var(--c2))}

/* STATS */
.stats{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap;animation:fadeUp .4s .08s ease both}
.chip{
  display:flex;align-items:center;gap:7px;padding:5px 14px;border-radius:30px;
  font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--muted);
  transition:all .25s;cursor:default;
}
.chip:hover{color:var(--c2);border-color:rgba(6,182,212,.35)}
.dot{width:6px;height:6px;border-radius:50%;background:var(--c2);animation:pulse 2s ease infinite;flex-shrink:0}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(6,182,212,.5)}50%{box-shadow:0 0 0 5px rgba(6,182,212,0)}}

/* LIST */
#list{display:flex;flex-direction:column;gap:5px}

/* ITEM */
.item{
  display:flex;align-items:center;gap:14px;padding:13px 16px;border-radius:16px;
  cursor:pointer;position:relative;overflow:hidden;
  transition:transform .2s cubic-bezier(.22,1,.36,1),border-color .2s,background .2s,box-shadow .2s;
  animation:itemIn .45s cubic-bezier(.22,1,.36,1) both;
}
@keyframes itemIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.item::before{
  content:'';position:absolute;top:0;left:-120%;width:60%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.04),transparent);
  transition:left .55s ease;pointer-events:none;
}
.item:hover::before{left:150%}
.item:hover{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.15);transform:translateY(-2px) translateX(4px)}
.item:active{transform:translateY(0) scale(.985)}
.item.t-dir:hover {box-shadow:inset 3px 0 0 #7c3aed,0 8px 32px rgba(0,0,0,.35),0 0 40px rgba(124,58,237,.08)}
.item.t-img:hover {box-shadow:inset 3px 0 0 #06b6d4,0 8px 32px rgba(0,0,0,.35),0 0 40px rgba(6,182,212,.08)}
.item.t-vid:hover {box-shadow:inset 3px 0 0 #f43f5e,0 8px 32px rgba(0,0,0,.35),0 0 40px rgba(244,63,94,.08)}
.item.t-pdf:hover {box-shadow:inset 3px 0 0 #f97316,0 8px 32px rgba(0,0,0,.35),0 0 40px rgba(249,115,22,.08)}
.item.t-file:hover{box-shadow:inset 3px 0 0 #64748b,0 8px 32px rgba(0,0,0,.35)}

/* ICON */
.ico{
  width:44px;height:44px;border-radius:14px;display:flex;align-items:center;
  justify-content:center;font-size:20px;flex-shrink:0;
  transition:transform .3s cubic-bezier(.34,1.56,.64,1);
}
.item:hover .ico{transform:scale(1.15) rotate(-6deg)}
.ico-dir {background:rgba(124,58,237,.15);border:1px solid rgba(124,58,237,.25)}
.ico-img {background:rgba(6,182,212,.12);border:1px solid rgba(6,182,212,.2)}
.ico-vid {background:rgba(244,63,94,.12);border:1px solid rgba(244,63,94,.2)}
.ico-pdf {background:rgba(249,115,22,.12);border:1px solid rgba(249,115,22,.2)}
.ico-file{background:rgba(100,116,139,.12);border:1px solid rgba(100,116,139,.2)}
.ico-back{background:rgba(124,58,237,.1);border:1px solid rgba(124,58,237,.2)}

.iname{font-size:13.5px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:color .2s}
.item:hover .iname{color:var(--c2)}
.imeta{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--dim);margin-top:3px}
.iinfo{flex:1;min-width:0}
.iright{display:flex;align-items:center;gap:8px;flex-shrink:0}

/* DOWNLOAD BTN MINI */
.dlm{
  width:32px;height:32px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  background:rgba(6,182,212,.08);border:1px solid rgba(6,182,212,.18);
  color:var(--c2);font-size:14px;text-decoration:none;
  opacity:0;transform:scale(.7) translateX(6px);
  transition:opacity .2s,transform .2s,background .2s,box-shadow .2s;
}
.item:hover .dlm{opacity:1;transform:scale(1) translateX(0)}
.dlm:hover{background:rgba(6,182,212,.2);box-shadow:0 0 20px rgba(6,182,212,.3)}
.arr{color:var(--dim);font-size:14px;transition:all .2s}
.item:hover .arr{color:var(--c2);transform:translateX(3px)}

/* PREVIEW */
.divider{height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.06),transparent);margin:32px 0}
.pcard{border-radius:22px;overflow:hidden;animation:fadeUp .5s cubic-bezier(.22,1,.36,1) both;position:relative}
.pcard::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;z-index:1;
  background:linear-gradient(90deg,transparent,var(--c1) 20%,var(--c2) 50%,var(--c3) 80%,transparent);
  background-size:200%;animation:ls 3s linear infinite;
}
@keyframes ls{from{background-position:0%}to{background-position:200%}}
.ph{padding:16px 20px;border-bottom:1px solid var(--gb);display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.pt{flex:1;min-width:0;font-size:14px;font-weight:600;color:var(--c2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.badge{padding:3px 12px;border-radius:20px;font-family:'JetBrains Mono',monospace;font-size:9.5px;letter-spacing:1px;text-transform:uppercase;border:1px solid;flex-shrink:0}
.b-img{color:#67e8f9;border-color:rgba(6,182,212,.35);background:rgba(6,182,212,.08)}
.b-vid{color:#fb7185;border-color:rgba(244,63,94,.35);background:rgba(244,63,94,.08)}
.b-pdf{color:#fb923c;border-color:rgba(249,115,22,.35);background:rgba(249,115,22,.08)}
.b-file{color:var(--muted);border-color:rgba(100,116,139,.3);background:rgba(100,116,139,.08)}
.pb{padding:20px}
.pb img{width:100%;border-radius:16px;display:block;box-shadow:0 20px 60px rgba(0,0,0,.6);transition:transform .3s;cursor:zoom-in}
.pb img:hover{transform:scale(1.01)}
.pb video{width:100%;border-radius:16px;display:block}
.pb iframe{width:100%;height:580px;border:none;border-radius:16px;display:block}

/* BUTTONS */
.acts{display:flex;gap:10px;margin-top:18px;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 22px;border-radius:12px;font-family:'Inter',sans-serif;font-size:13px;font-weight:600;text-decoration:none;cursor:pointer;border:none;transition:all .25s cubic-bezier(.22,1,.36,1)}
.btn-p{background:linear-gradient(135deg,var(--c1),var(--c2));color:#fff;box-shadow:0 4px 20px rgba(124,58,237,.35)}
.btn-p:hover{transform:translateY(-3px);box-shadow:0 12px 35px rgba(6,182,212,.4)}
.btn-p:active{transform:translateY(-1px)}
.btn-o{background:rgba(255,255,255,.04);color:var(--muted);border:1px solid rgba(255,255,255,.1)}
.btn-o:hover{background:rgba(255,255,255,.08);color:var(--text);transform:translateY(-2px);border-color:rgba(255,255,255,.2)}

/* STATES */
.loading{text-align:center;padding:70px 20px;color:var(--dim)}
.spin{
  width:40px;height:40px;margin:0 auto 20px;border-radius:50%;
  background:conic-gradient(var(--c2) 0deg,transparent 240deg);
  animation:spinning .9s linear infinite;
  mask:radial-gradient(farthest-side,transparent calc(100% - 3px),#fff calc(100% - 3px));
  -webkit-mask:radial-gradient(farthest-side,transparent calc(100% - 3px),#fff calc(100% - 3px));
}
@keyframes spinning{to{transform:rotate(360deg)}}
.loading p{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:2px;text-transform:uppercase}
.empty{text-align:center;padding:60px 20px}
.empty span{font-size:44px;margin-bottom:16px;opacity:.4;display:block;animation:flt 3s ease-in-out infinite}
@keyframes flt{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.empty p{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--dim);letter-spacing:2px;text-transform:uppercase}
.err{padding:22px;border-radius:16px;text-align:center;background:rgba(244,63,94,.06);border:1px solid rgba(244,63,94,.2);color:#fb7185;font-family:'JetBrains Mono',monospace;font-size:11px}

/* TOAST */
#toast{
  position:fixed;bottom:36px;left:50%;
  transform:translateX(-50%) translateY(70px);
  background:rgba(15,20,35,.96);border:1px solid rgba(6,182,212,.25);
  color:var(--c2);font-family:'JetBrains Mono',monospace;font-size:11px;
  padding:10px 24px;border-radius:30px;
  box-shadow:0 12px 40px rgba(0,0,0,.5),0 0 30px rgba(6,182,212,.12);
  transition:transform .4s cubic-bezier(.22,1,.36,1),opacity .4s;
  opacity:0;z-index:9999;pointer-events:none;white-space:nowrap;
  backdrop-filter:blur(16px);
}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1}

/* RIPPLE */
.rip{position:absolute;border-radius:50%;width:8px;height:8px;background:rgba(6,182,212,.22);transform:scale(0);animation:ripA .55s ease-out;pointer-events:none;z-index:20}
@keyframes ripA{to{transform:scale(32);opacity:0}}

@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:2px}::-webkit-scrollbar-thumb:hover{background:rgba(6,182,212,.4)}
@media(max-width:600px){.wrap{padding:28px 14px 70px}h1{font-size:24px}}
</style>
</head>
<body>
<canvas id="aurora"></canvas>
<div id="toast"></div>

<div class="wrap">
  <div class="hdr">
    <div class="hdr-inner">
      <div class="logo">📂</div>
      <div>
        <h1>FileThi</h1>
        <div class="sub">Trần Hưng Tài · Hanniee12/luyende</div>
      </div>
    </div>
  </div>

  <div class="bc glass" id="path">
    <span style="opacity:.4;font-size:10px">◆</span>
    <span>/ data</span>
  </div>

  <div class="stats">
    <div class="chip glass"><span class="dot"></span><span id="fc">— items</span></div>
    <div class="chip glass"><span style="font-size:11px">⎇</span><span>main</span></div>
    <div class="chip glass" onclick="loadFiles(cur)" style="cursor:pointer">
      <span id="ri" style="display:inline-block;transition:transform .5s;font-size:12px">↻</span>
      <span>refresh</span>
    </div>
  </div>

  <div id="list"><div class="loading"><div class="spin"></div><p>Loading...</p></div></div>
  <div id="preview"></div>
</div>

<script>
const U="Hanniee12",R="luyende",BASE="data";
let cur="";

/* ── Aurora canvas ── */
(()=>{
  const cv=document.getElementById('aurora'),ctx=cv.getContext('2d');
  let W,H;
  const resize=()=>{W=cv.width=window.innerWidth;H=cv.height=window.innerHeight};
  resize();window.addEventListener('resize',resize);
  const orbs=[
    {x:.12,y:.18,r:.55,col:'124,58,237',s:.00028,p:0},
    {x:.82,y:.72,r:.48,col:'6,182,212',s:.00022,p:2.1},
    {x:.5,y:.45,r:.38,col:'244,63,94',s:.00018,p:4.2},
    {x:.88,y:.12,r:.32,col:'139,92,246',s:.00032,p:1},
  ];
  function draw(){
    ctx.clearRect(0,0,W,H);
    const t=Date.now();
    orbs.forEach(o=>{
      const px=(o.x+Math.sin(t*o.s+o.p)*.13)*W;
      const py=(o.y+Math.cos(t*o.s*.8+o.p)*.11)*H;
      const rad=o.r*Math.min(W,H)*.9;
      const g=ctx.createRadialGradient(px,py,0,px,py,rad);
      g.addColorStop(0,`rgba(${o.col},.2)`);
      g.addColorStop(.5,`rgba(${o.col},.07)`);
      g.addColorStop(1,`rgba(${o.col},0)`);
      ctx.fillStyle=g;ctx.beginPath();ctx.arc(px,py,rad,0,Math.PI*2);ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  draw();
})();

function toast(m){
  const el=document.getElementById('toast');el.textContent=m;el.classList.add('show');
  clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),2800);
}
function rip(el,e){
  const r=document.createElement('span');r.className='rip';
  const rc=el.getBoundingClientRect();
  r.style.left=(e.clientX-rc.left-4)+'px';r.style.top=(e.clientY-rc.top-4)+'px';
  el.appendChild(r);setTimeout(()=>r.remove(),560);
}
function ftype(n){
  n=n.toLowerCase();
  if(/\.(jpg|jpeg|png|gif|webp|svg)$/.test(n))return'img';
  if(/\.(mp4|webm|ogg|mov)$/.test(n))return'vid';
  if(n.endsWith('.pdf'))return'pdf';
  return'file';
}
function getIcon(item){
  if(item.type==='dir')return{e:'📁',ic:'ico-dir',t:'t-dir'};
  return{img:{e:'🖼️',ic:'ico-img',t:'t-img'},vid:{e:'🎬',ic:'ico-vid',t:'t-vid'},pdf:{e:'📕',ic:'ico-pdf',t:'t-pdf'},file:{e:'📄',ic:'ico-file',t:'t-file'}}[ftype(item.name)];
}

async function loadFiles(folder=''){
  cur=folder;
  const list=document.getElementById('list');
  document.getElementById('preview').innerHTML='';
  list.innerHTML='<div class="loading"><div class="spin"></div><p>Loading...</p></div>';
  const parts=folder?folder.split('/'):[]; 
  document.getElementById('path').innerHTML=`<span style="opacity:.4;font-size:10px">◆</span><span>/ ${['data',...parts].join(' › ')}</span>`;
  const ri=document.getElementById('ri');
  ri.style.transform='rotate(360deg)';setTimeout(()=>ri.style.transform='',500);
  try{
    const res=await fetch(`https://api.github.com/repos/${U}/${R}/contents/${BASE}${folder?'/'+folder:''}?ref=main`);
    if(!res.ok)throw new Error('HTTP '+res.status);
    const data=await res.json();
    data.sort((a,b)=>(a.type==='dir'&&b.type!=='dir'?-1:a.type!=='dir'&&b.type==='dir'?1:a.name.localeCompare(b.name)));
    document.getElementById('fc').textContent=data.length+' items';
    list.innerHTML='';
    if(folder){
      const back=document.createElement('div');
      back.className='item glass t-dir';
      back.innerHTML=`<div class="ico ico-back" style="font-size:16px">←</div><div class="iinfo"><div class="iname">Quay lại</div><div class="imeta">parent directory</div></div><div class="iright"><div class="arr">↖</div></div>`;
      back.onclick=e=>{rip(back,e);setTimeout(()=>loadFiles(folder.split('/').slice(0,-1).join('/')),100)};
      list.appendChild(back);
    }
    if(!data.length){list.innerHTML='<div class="empty"><span>📭</span><p>Thư mục trống</p></div>';return}
    data.forEach((item,i)=>{
      const ic=getIcon(item),div=document.createElement('div');
      div.className=`item glass ${ic.t}`;div.style.animationDelay=i*32+'ms';
      const ext=item.type==='dir'?'Thư mục':(item.name.split('.').pop().toUpperCase()+' file');
      const dl=item.type!=='dir'?`<a class="dlm" href="${item.download_url}" download="${item.name}" onclick="event.stopPropagation();toast('⬇ Đang tải ${item.name.replace(/'/g,"\\'")}')">⬇</a>`:'';
      div.innerHTML=`<div class="ico ${ic.ic}">${ic.e}</div><div class="iinfo"><div class="iname">${item.name}</div><div class="imeta">${ext}</div></div><div class="iright">${dl}<div class="arr">${item.type==='dir'?'›':'↗'}</div></div>`;
      if(item.type==='dir'){
        div.onclick=e=>{rip(div,e);setTimeout(()=>loadFiles((folder?folder+'/':'')+item.name),100)};
      }else{
        div.onclick=e=>{if(e.target.closest('.dlm'))return;rip(div,e);setTimeout(()=>preview(item),80)};
      }
      list.appendChild(div);
    });
  }catch(err){list.innerHTML=`<div class="err">⚠ Lỗi tải dữ liệu — ${err.message}</div>`}
}

function preview(file){
  const url=file.download_url,type=ftype(file.name),ic=getIcon(file);
  const bm={img:['IMAGE','b-img'],vid:['VIDEO','b-vid'],pdf:['PDF','b-pdf'],file:['FILE','b-file']};
  const [bt,bc]=bm[type]||['FILE','b-file'];
  let body='';
  if(type==='img'){
    body=`<img src="${url}" loading="lazy"><div class="acts"><a href="${url}" download="${file.name}" class="btn btn-p" onclick="toast('⬇ Đang tải ảnh...')">⬇ Tải xuống</a><a href="${url}" target="_blank" class="btn btn-o">↗ Mở full</a></div>`;
  }else if(type==='vid'){
    body=`<video controls crossorigin="anonymous"><source src="${url}"></video><div class="acts"><a href="${url}" download="${file.name}" class="btn btn-p" onclick="toast('⬇ Đang tải video...')">⬇ Tải xuống</a><a href="${url}" target="_blank" class="btn btn-o">↗ Mở tab mới</a></div>`;
  }else if(type==='pdf'){
    const gv=`https://docs.google.com/gview?url=${encodeURIComponent(url)}&embedded=true`;
    body=`<iframe src="${gv}" loading="lazy"></iframe><div class="acts"><a href="${url}" download="${file.name}" class="btn btn-p" onclick="toast('⬇ Đang tải PDF...')">⬇ Tải PDF</a><a href="${gv}" target="_blank" class="btn btn-o">👁 Google View</a><a href="${url}" target="_blank" class="btn btn-o">↗ Mở trực tiếp</a></div>`;
  }else{
    body=`<div style="text-align:center;padding:36px;border-radius:16px;background:rgba(255,255,255,.02);border:1px dashed rgba(255,255,255,.08)"><div style="font-size:52px;margin-bottom:18px">${ic.e}</div><div style="font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--dim);margin-bottom:22px">${file.name}</div><div class="acts" style="justify-content:center"><a href="${url}" download="${file.name}" class="btn btn-p" onclick="toast('⬇ Đang tải...')">⬇ Tải xuống</a><a href="${url}" target="_blank" class="btn btn-o">↗ Mở file</a></div></div>`;
  }
  document.getElementById('preview').innerHTML=`<div class="divider"></div><div class="pcard glass"><div class="ph"><span style="font-size:22px">${ic.e}</span><div class="pt">${file.name}</div><span class="badge ${bc}">${bt}</span></div><div class="pb">${body}</div></div>`;
  document.getElementById('preview').scrollIntoView({behavior:'smooth',block:'nearest'});
}

loadFiles();
</script>
</body>
</html>
