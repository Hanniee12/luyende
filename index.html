<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>File Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #050810;
    --surface: #0b1120;
    --surface2: #111827;
    --accent: #00f5c4;
    --accent2: #7c5cfc;
    --accent3: #ff6b6b;
    --text: #e2e8f0;
    --muted: #64748b;
    --border: rgba(0, 245, 196, 0.15);
    --glow: 0 0 20px rgba(0, 245, 196, 0.3);
    --glow2: 0 0 20px rgba(124, 92, 252, 0.3);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated starfield background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 20% 30%, rgba(0,245,196,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 80% 10%, rgba(124,92,252,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 50% 70%, rgba(0,245,196,0.2) 0%, transparent 100%),
      radial-gradient(1px 1px at 10% 90%, rgba(255,107,107,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 60%, rgba(124,92,252,0.3) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  /* Mesh gradient overlay */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 50% at 0% 0%, rgba(124,92,252,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 60% 60% at 100% 100%, rgba(0,245,196,0.06) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    padding: 40px 24px;
  }

  /* Header */
  .header {
    margin-bottom: 40px;
    animation: fadeDown 0.6s ease both;
  }

  .header-top {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 8px;
  }

  .logo-icon {
    width: 48px;
    height: 48px;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    box-shadow: 0 0 30px rgba(0,245,196,0.3), 0 0 60px rgba(124,92,252,0.2);
    animation: pulseGlow 3s ease-in-out infinite;
  }

  @keyframes pulseGlow {
    0%, 100% { box-shadow: 0 0 30px rgba(0,245,196,0.3), 0 0 60px rgba(124,92,252,0.2); }
    50% { box-shadow: 0 0 50px rgba(0,245,196,0.5), 0 0 100px rgba(124,92,252,0.4); }
  }

  .header h1 {
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .header-sub {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-left: 64px;
  }

  /* Breadcrumb */
  .breadcrumb {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 18px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 20px;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    animation: fadeUp 0.5s ease both;
    overflow: hidden;
    position: relative;
  }

  .breadcrumb::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: linear-gradient(to bottom, var(--accent), var(--accent2));
    border-radius: 0 2px 2px 0;
  }

  /* Stats bar */
  .stats-bar {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
    animation: fadeUp 0.5s 0.1s ease both;
  }

  .stat-chip {
    padding: 6px 14px;
    border-radius: 30px;
    background: var(--surface);
    border: 1px solid var(--border);
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 6px;
    transition: all 0.3s;
  }

  .stat-chip .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 6px var(--accent);
    animation: blink 2s ease-in-out infinite;
  }

  @keyframes blink {
    0%,100% { opacity:1; }
    50% { opacity: 0.3; }
  }

  /* File list */
  #list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .item {
    position: relative;
    padding: 14px 18px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
    display: flex;
    align-items: center;
    gap: 14px;
    overflow: hidden;
    animation: slideIn 0.4s ease both;
  }

  .item::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(0,245,196,0.05), rgba(124,92,252,0.05));
    opacity: 0;
    transition: opacity 0.3s;
  }

  .item::after {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 0;
    background: linear-gradient(to bottom, var(--accent), var(--accent2));
    border-radius: 0 2px 2px 0;
    transition: width 0.3s ease;
  }

  .item:hover {
    border-color: rgba(0,245,196,0.4);
    transform: translateX(4px);
    box-shadow: var(--glow), -4px 0 0 0 var(--accent);
  }

  .item:hover::before { opacity: 1; }
  .item:hover::after { width: 3px; }

  .item:active {
    transform: translateX(2px) scale(0.99);
  }

  .item-icon {
    width: 40px; height: 40px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
    position: relative;
    transition: transform 0.3s;
  }

  .item:hover .item-icon {
    transform: scale(1.1) rotate(-5deg);
  }

  .icon-dir { background: rgba(124,92,252,0.15); box-shadow: 0 0 15px rgba(124,92,252,0.2); }
  .icon-img { background: rgba(0,245,196,0.15); box-shadow: 0 0 15px rgba(0,245,196,0.2); }
  .icon-vid { background: rgba(255,107,107,0.15); box-shadow: 0 0 15px rgba(255,107,107,0.2); }
  .icon-pdf { background: rgba(255,150,50,0.15); box-shadow: 0 0 15px rgba(255,150,50,0.2); }
  .icon-file { background: rgba(100,116,139,0.15); }

  .item-info { flex: 1; min-width: 0; }

  .item-name {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    transition: color 0.3s;
  }

  .item:hover .item-name { color: var(--accent); }

  .item-meta {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    margin-top: 3px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .item-arrow {
    color: var(--muted);
    font-size: 14px;
    transition: all 0.3s;
    flex-shrink: 0;
  }

  .item:hover .item-arrow {
    color: var(--accent);
    transform: translateX(4px);
  }

  /* Back button special style */
  .item-back {
    border-color: rgba(124,92,252,0.3);
  }

  .item-back:hover {
    border-color: rgba(124,92,252,0.6);
    box-shadow: var(--glow2), -4px 0 0 0 var(--accent2);
  }

  .item-back::after {
    background: linear-gradient(to bottom, var(--accent2), var(--accent));
  }

  /* Preview panel */
  #preview {
    margin-top: 28px;
    animation: fadeUp 0.5s ease both;
  }

  .preview-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
    position: relative;
  }

  .preview-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(0,245,196,0.03), rgba(124,92,252,0.03));
    pointer-events: none;
  }

  .preview-header {
    padding: 18px 22px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .preview-title {
    font-size: 15px;
    font-weight: 700;
    color: var(--accent);
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .preview-badge {
    padding: 3px 10px;
    border-radius: 20px;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    border: 1px solid;
  }

  .badge-img { color: var(--accent); border-color: rgba(0,245,196,0.3); background: rgba(0,245,196,0.08); }
  .badge-vid { color: var(--accent3); border-color: rgba(255,107,107,0.3); background: rgba(255,107,107,0.08); }
  .badge-pdf { color: #ffaa44; border-color: rgba(255,170,68,0.3); background: rgba(255,170,68,0.08); }
  .badge-file { color: var(--muted); border-color: rgba(100,116,139,0.3); background: rgba(100,116,139,0.08); }

  .preview-body { padding: 22px; }

  .preview-body img {
    width: 100%;
    border-radius: 12px;
    cursor: zoom-in;
    transition: transform 0.3s, box-shadow 0.3s;
    display: block;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }

  .preview-body img:hover {
    transform: scale(1.01);
    box-shadow: 0 16px 48px rgba(0,0,0,0.6);
  }

  .preview-body video {
    width: 100%;
    border-radius: 12px;
    display: block;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }

  .preview-body iframe {
    width: 100%;
    height: 600px;
    border: none;
    border-radius: 12px;
    display: block;
  }

  .download-btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 12px 24px;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    border-radius: 12px;
    color: #fff;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 14px;
    text-decoration: none;
    transition: all 0.3s;
    box-shadow: 0 4px 20px rgba(0,245,196,0.3);
  }

  .download-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(0,245,196,0.5);
  }

  .pdf-fallback {
    margin-top: 16px;
    display: block;
  }

  /* Divider */
  .divider {
    height: 1px;
    background: linear-gradient(to right, transparent, var(--border), transparent);
    margin: 24px 0;
  }

  /* Loading state */
  .loading {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 13px;
  }

  .loading-spinner {
    width: 40px; height: 40px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    margin: 0 auto 16px;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Error state */
  .error-msg {
    padding: 20px;
    background: rgba(255,107,107,0.08);
    border: 1px solid rgba(255,107,107,0.3);
    border-radius: 12px;
    color: var(--accent3);
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    text-align: center;
  }

  /* Animations */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-12px); }
    to { opacity: 1; transform: translateX(0); }
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

  /* Ripple effect */
  .ripple {
    position: absolute;
    border-radius: 50%;
    background: rgba(0,245,196,0.2);
    width: 10px; height: 10px;
    transform: scale(0);
    animation: rippleAnim 0.5s linear;
    pointer-events: none;
    z-index: 10;
  }

  @keyframes rippleAnim {
    to { transform: scale(25); opacity: 0; }
  }

  /* Scan line effect */
  .scan-line {
    position: fixed;
    left: 0; right: 0;
    height: 1px;
    background: linear-gradient(to right, transparent, rgba(0,245,196,0.1), transparent);
    animation: scanMove 6s linear infinite;
    pointer-events: none;
    z-index: 999;
  }

  @keyframes scanMove {
    from { top: -1px; }
    to { top: 100vh; }
  }

  /* Corner decorations */
  .corner-deco {
    position: fixed;
    width: 60px; height: 60px;
    pointer-events: none;
    z-index: 2;
  }

  .corner-deco.tl { top: 20px; left: 20px; border-top: 1px solid var(--accent); border-left: 1px solid var(--accent); opacity: 0.3; }
  .corner-deco.br { bottom: 20px; right: 20px; border-bottom: 1px solid var(--accent); border-right: 1px solid var(--accent); opacity: 0.3; }
</style>
</head>
<body>

<div class="scan-line"></div>
<div class="corner-deco tl"></div>
<div class="corner-deco br"></div>

<div class="container">
  <div class="header">
    <div class="header-top">
      <div class="logo-icon">📂</div>
      <h1>File Manager</h1>
    </div>
    <div class="header-sub">GitHub Repository Browser · Hanniee12/luyende</div>
  </div>

  <div class="breadcrumb" id="path">
    <span>⬡</span>
    <span>/data</span>
  </div>

  <div class="stats-bar">
    <div class="stat-chip">
      <span class="dot"></span>
      <span id="file-count">— items</span>
    </div>
    <div class="stat-chip">
      <span>🔗</span>
      <span>main branch</span>
    </div>
  </div>

  <div id="list">
    <div class="loading">
      <div class="loading-spinner"></div>
      Đang tải dữ liệu...
    </div>
  </div>

  <div id="preview"></div>
</div>

<script>
  const user = "Hanniee12";
  const repo = "luyende";
  const basePath = "data";

  function addRipple(el, e) {
    const ripple = document.createElement('span');
    ripple.className = 'ripple';
    const rect = el.getBoundingClientRect();
    ripple.style.left = (e.clientX - rect.left - 5) + 'px';
    ripple.style.top = (e.clientY - rect.top - 5) + 'px';
    el.appendChild(ripple);
    setTimeout(() => ripple.remove(), 500);
  }

  function getFileType(name) {
    const n = name.toLowerCase();
    if (n.match(/\.(jpg|jpeg|png|gif|webp)$/)) return 'img';
    if (n.match(/\.(mp4|webm|ogg)$/)) return 'vid';
    if (n.endsWith('.pdf')) return 'pdf';
    return 'file';
  }

  function getIcon(item) {
    if (item.type === 'dir') return { emoji: '📁', cls: 'icon-dir' };
    const t = getFileType(item.name);
    const map = {
      img: { emoji: '🖼️', cls: 'icon-img' },
      vid: { emoji: '🎬', cls: 'icon-vid' },
      pdf: { emoji: '📕', cls: 'icon-pdf' },
      file: { emoji: '📄', cls: 'icon-file' },
    };
    return map[t];
  }

  function getTypeMeta(item) {
    if (item.type === 'dir') return 'folder';
    const t = getFileType(item.name);
    const ext = item.name.split('.').pop().toUpperCase();
    return ext + ' file';
  }

  async function loadFiles(folder = "") {
    const list = document.getElementById("list");
    list.innerHTML = '<div class="loading"><div class="loading-spinner"></div>Đang tải dữ liệu...</div>';
    document.getElementById("preview").innerHTML = "";

    const pathParts = folder ? folder.split('/') : [];
    const breadcrumb = ['data', ...pathParts].join(' › ');
    document.getElementById("path").innerHTML = `<span>⬡</span><span>/ ${breadcrumb}</span>`;

    try {
      const api = `https://api.github.com/repos/${user}/${repo}/contents/${basePath}${folder ? "/" + folder : ""}?ref=main`;
      const res = await fetch(api);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();

      list.innerHTML = "";
      document.getElementById("file-count").textContent = data.length + " items";

      if (folder !== "") {
        const back = document.createElement("div");
        back.className = "item item-back";
        back.innerHTML = `
          <div class="item-icon icon-dir">⬅</div>
          <div class="item-info">
            <div class="item-name">Quay lại</div>
            <div class="item-meta">parent directory</div>
          </div>
          <div class="item-arrow">↖</div>
        `;
        back.style.animationDelay = '0ms';
        back.onclick = (e) => {
          addRipple(back, e);
          setTimeout(() => loadFiles(folder.split("/").slice(0, -1).join("/")), 120);
        };
        list.appendChild(back);
      }

      data.forEach((item, i) => {
        const div = document.createElement("div");
        div.className = "item";
        div.style.animationDelay = `${i * 40}ms`;
        const ic = getIcon(item);
        const meta = getTypeMeta(item);
        div.innerHTML = `
          <div class="item-icon ${ic.cls}">${ic.emoji}</div>
          <div class="item-info">
            <div class="item-name">${item.name}</div>
            <div class="item-meta">${meta}</div>
          </div>
          <div class="item-arrow">›</div>
        `;
        if (item.type === "dir") {
          div.onclick = (e) => {
            addRipple(div, e);
            setTimeout(() => loadFiles((folder ? folder + "/" : "") + item.name), 120);
          };
        } else {
          div.onclick = (e) => {
            addRipple(div, e);
            setTimeout(() => previewFile(item), 80);
          };
        }
        list.appendChild(div);
      });

    } catch (err) {
      list.innerHTML = `<div class="error-msg">⚠ Không thể tải dữ liệu: ${err.message}</div>`;
    }
  }

  function previewFile(file) {
    const url = file.download_url;
    const type = getFileType(file.name);
    const preview = document.getElementById("preview");

    const badgeMap = {
      img: ['IMAGE', 'badge-img'],
      vid: ['VIDEO', 'badge-vid'],
      pdf: ['PDF', 'badge-pdf'],
      file: ['FILE', 'badge-file'],
    };
    const [badgeText, badgeCls] = badgeMap[type];

    let bodyContent = '';

    if (type === 'img') {
      bodyContent = `<img src="${url}" onclick="window.open('${url}')" title="Nhấn để mở full size">`;
    } else if (type === 'vid') {
      bodyContent = `<video controls src="${url}"></video>`;
    } else if (type === 'pdf') {
      bodyContent = `
        <iframe src="${url}"></iframe>
        <a href="${url}" target="_blank" class="download-btn pdf-fallback">
          <span>↗</span> Mở trong tab mới
        </a>
      `;
    } else {
      bodyContent = `
        <a href="${url}" target="_blank" class="download-btn">
          <span>⬇</span> Tải file xuống
        </a>
      `;
    }

    preview.innerHTML = `
      <div class="divider"></div>
      <div class="preview-card">
        <div class="preview-header">
          <span style="font-size:20px">${getIcon(file).emoji}</span>
          <div class="preview-title">${file.name}</div>
          <span class="preview-badge ${badgeCls}">${badgeText}</span>
        </div>
        <div class="preview-body">${bodyContent}</div>
      </div>
    `;

    preview.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  loadFiles();
</script>
</body>
</html>
