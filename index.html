<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>📂 File Manager</title>

<style>
body {
  background:#0d1117;
  color:#00ffcc;
  font-family: Arial;
  padding:20px;
}
h2 { color:#00ffaa }

.item {
  border:1px solid #00ffcc33;
  padding:10px;
  margin:6px 0;
  border-radius:8px;
  cursor:pointer;
  transition:0.2s;
}
.item:hover {
  background:#00ffcc22;
}

a {
  color:#00ffcc;
  text-decoration:none;
}

#preview {
  margin-top:20px;
}
img, video {
  max-width:100%;
  border-radius:10px;
  margin-top:10px;
}
</style>
</head>

<body>

<h2>📂 File Manager GitHub</h2>
<div id="path"></div>
<div id="list"></div>

<div id="preview"></div>

<script>
const user = "Hanniee12";
const repo = "luyende";
const basePath = "data";

async function loadFiles(folder="") {
  const api = `https://api.github.com/repos/${user}/${repo}/contents/${basePath}${folder ? "/" + folder : ""}?ref=main`;

  const res = await fetch(api);
  const data = await res.json();

  console.log(data); // debug

  const list = document.getElementById("list");
  list.innerHTML = "";

  document.getElementById("path").innerHTML = "📁 /" + folder;

  // nút quay lại
  if (folder !== "") {
    const back = document.createElement("div");
    back.className = "item";
    back.innerHTML = "⬅ Quay lại";
    back.onclick = () => loadFiles(folder.split("/").slice(0,-1).join("/"));
    list.appendChild(back);
  }

  data.forEach(item => {
    const div = document.createElement("div");
    div.className = "item";

    // 👇 FIX QUAN TRỌNG
    if (item.type === "dir") {
      div.innerHTML = "📁 " + item.name;
      div.onclick = () => loadFiles((folder ? folder + "/" : "") + item.name);
    } 
    else if (item.type === "file") {
      div.innerHTML = `📄 ${item.name}`;
      div.onclick = () => window.open(item.download_url, "_blank");
    }

    list.appendChild(div);
  });
}

loadFiles();
</script>

</body>
</html>
